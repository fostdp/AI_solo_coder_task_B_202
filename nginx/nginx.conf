user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # ============================================================
    # Gzip + Brotli Compression
    # ============================================================
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        image/x-icon
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ============================================================
    # Proxy timeouts
    # ============================================================
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;
    send_timeout                60s;
    client_max_body_size        10m;
    client_body_buffer_size     128k;

    # ============================================================
    # Upstream: Go backend
    # ============================================================
    upstream bianzhong_backend {
        server bianzhong-server:8080;
        keepalive 32;
    }

    server {
        listen       80;
        server_name  _;

        charset utf-8;

        # ----------------------------------------------------------
        # Static frontend (brotli + gzip + long cache)
        # ----------------------------------------------------------
        location ^~ /js/ {
            alias /usr/share/nginx/html/frontend/js/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri =404;
        }

        location ^~ /css/ {
            alias /usr/share/nginx/html/frontend/css/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        location ^~ /assets/ {
            alias /usr/share/nginx/html/frontend/assets/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }

        location = / {
            alias /usr/share/nginx/html/frontend/index.html;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location = /index.html {
            alias /usr/share/nginx/html/frontend/index.html;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # ----------------------------------------------------------
        # API + WebSocket -> Go backend
        # ----------------------------------------------------------
        location /api/ {
            proxy_pass         http://bianzhong_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;

            # WebSocket upgrade
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         "upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /metrics {
            proxy_pass         http://bianzhong_backend/metrics;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
        }

        location /debug/ {
            proxy_pass         http://bianzhong_backend/debug/;
            proxy_set_header   Host               $host;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }

        # ----------------------------------------------------------
        # Security headers
        # ----------------------------------------------------------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
