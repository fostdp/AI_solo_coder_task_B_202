apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescale:5432
    database: bianzhong
    user: bianzhong
    secureJsonData:
      password: bianzhong_secure_pw_2024!
    jsonData:
      postgresVersion: 1500
      sslmode: disable
      timescaledb: true
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
