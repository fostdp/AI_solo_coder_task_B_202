global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    cluster: bianzhong-acoustic
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  # ------------------------------------------------------------
  # Bianzhong Go Backend
  # ------------------------------------------------------------
  - job_name: bianzhong-backend
    honor_labels: true
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - bianzhong-server:8080
        labels:
          service: bianzhong-acoustic
          component: go-server
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ------------------------------------------------------------
  # Prometheus self-monitoring
  # ------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ------------------------------------------------------------
  # Mosquitto (via exporter if present; fallback disabled)
  # ------------------------------------------------------------
  # - job_name: mosquitto-exporter
  #   static_configs:
  #     - targets:
  #         - mosquitto-exporter:9234
